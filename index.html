<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoRA Port Requests</title>
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #18181c;
      --surface2: #22222a;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f0efed;
      --text-muted: #7a7a88;
      --text-dim: #4a4a58;
      --accent: #c17fff;
      --accent-bg: rgba(193,127,255,0.08);
      --accent-border: rgba(193,127,255,0.25);
      --green: #4dcc8a;
      --green-bg: rgba(77,204,138,0.08);
      --radius: 10px;
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    /* ── Layout ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(15,15,17,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      text-decoration: none;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, #c17fff 0%, #7c3aed 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
    .header-actions { display: flex; gap: 10px; align-items: center; }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Hero ── */
    .hero { margin-bottom: 40px; }
    .hero h1 {
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      color: var(--text-muted);
      font-size: 15px;
      max-width: 520px;
    }

    /* ── Search / Filter ── */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }
    input[type="search"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 9px 12px 9px 34px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="search"]:focus { border-color: var(--accent-border); }
    input[type="search"]::placeholder { color: var(--text-dim); }

    .sort-btn, .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .sort-btn:hover, .btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }
    .sort-btn.active {
      border-color: var(--accent-border);
      color: var(--accent);
      background: var(--accent-bg);
    }

    /* ── Lora Grid ── */
    .lora-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .lora-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
    }
    .lora-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }
    .lora-card.voted {
      border-color: var(--accent-border);
      background: var(--surface);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 3/2;
      background: var(--surface2);
      position: relative;
      overflow: hidden;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-thumb .no-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--text-dim);
      background: linear-gradient(135deg, #1a1a22 0%, #22222e 100%);
    }
    .voted-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--accent);
      color: #1a0d2e;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      display: none;
    }
    .lora-card.voted .voted-badge { display: block; }

    .card-body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }
    .card-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 11px;
      font-family: var(--mono);
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .tag.base-model {
      background: var(--accent-bg);
      color: var(--accent);
      border-color: var(--accent-border);
    }

    .card-stats {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .card-stats span { display: flex; align-items: center; gap: 4px; }
    .card-stats svg { opacity: 0.5; }

    .vote-btn {
      margin-top: auto;
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      padding: 9px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.15s;
    }
    .vote-btn:hover {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--accent);
    }
    .vote-btn.voted-state {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--accent);
    }
    .vote-count-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px;
      padding: 1px 7px;
      font-family: var(--mono);
    }
    .voted-state .vote-count-pill {
      background: rgba(193,127,255,0.15);
      border-color: var(--accent-border);
    }

    /* ── Loading / Empty ── */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      grid-column: 1/-1;
    }
    .state-msg .icon { font-size: 32px; margin-bottom: 12px; }
    .state-msg p { font-size: 14px; margin-top: 6px; }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface2);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius);
      padding: 12px 18px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      max-width: 300px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { border-color: rgba(255,80,80,0.4); }

    /* ── Setup Banner ── */
    #setup-banner {
      background: var(--surface);
      border: 1px solid rgba(255,200,80,0.2);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 28px;
      display: none;
    }
    #setup-banner h3 { font-size: 13px; font-weight: 600; color: #ffc850; margin-bottom: 6px; }
    #setup-banner p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
    #setup-banner code {
      font-family: var(--mono);
      background: var(--surface2);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 11px;
      color: var(--text);
    }
    #setup-banner.visible { display: block; }

    /* ── Admin View ── */
    #admin-view { display: none; }
    #admin-view.visible { display: block; }
    #main-view { }
    #main-view.hidden { display: none; }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .admin-header h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }

    .leaderboard { display: flex; flex-direction: column; gap: 10px; }
    .lb-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      transition: border-color 0.15s;
    }
    .lb-item:hover { border-color: var(--border-hover); }
    .lb-rank {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      min-width: 24px;
    }
    .lb-rank.top { color: var(--accent); }
    .lb-info { flex: 1; min-width: 0; }
    .lb-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lb-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
      font-family: var(--mono);
    }
    .lb-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      min-width: 60px;
      max-width: 180px;
    }
    .lb-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.34,1.2,0.64,1);
    }
    .lb-votes {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      min-width: 36px;
      text-align: right;
    }
    .lb-empty {
      text-align: center;
      padding: 50px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Config modal */
    #config-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }
    #config-modal.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border-hover);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 500px;
    }
    .modal-box h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
    .modal-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 22px; }
    .field { margin-bottom: 16px; }
    .field label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 6px; font-weight: 500; }
    .field input, .field textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent-border); }
    .field input::placeholder, .field textarea::placeholder { color: var(--text-dim); }
    .modal-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #1a0d2e;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .modal-note {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 14px;
      line-height: 1.5;
    }
    .modal-note a { color: var(--accent); }

    /* Responsive */
    @media (max-width: 500px) {
      header { padding: 14px 16px; }
      main { padding: 28px 16px 60px; }
      .lora-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    }
    @media (max-width: 380px) {
      .lora-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#" onclick="showMain(); return false;">
    <div class="logo-icon">✦</div>
    LoRA Requests
  </a>
  <div class="header-actions">
    <button class="sort-btn" id="admin-toggle-btn" onclick="toggleAdmin()">Admin</button>
  </div>
</header>

<main>



  <!-- Main view -->
  <div id="main-view">
    <div class="hero">
      <h1>Which LoRA should I<br>port <span>next</span>?</h1>
      <p>Vote for the model you want to see on a different checkpoint. Most-requested will be ported first.</p>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="search-input" placeholder="Search models…" oninput="filterCards()" />
      </div>
      <button class="sort-btn active" id="sort-popular" onclick="setSortMode('popular')">Most votes</button>
      <button class="sort-btn" id="sort-newest" onclick="setSortMode('newest')">Newest</button>
      <button class="sort-btn" id="sort-az" onclick="setSortMode('az')">A–Z</button>
    </div>

    <div class="lora-grid" id="lora-grid">
      <div class="state-msg">
        <div class="spinner"></div>
        <p>Loading your LoRAs from Civitai…</p>
      </div>
    </div>
  </div>

  <!-- Admin view -->
  <div id="admin-view">
    <div class="admin-header">
      <h2>Port request leaderboard</h2>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
    </div>
    <div class="leaderboard" id="leaderboard"></div>
  </div>

</main>

<!-- Toast -->
<div id="toast"></div>


<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const GH_USER    = 'Gereccan';
const GH_REPO    = 'request-lora';
const CI_USER    = 'Gereccan';
const VOTES_KEY  = 'lora_votes_local';
const VOTED_KEY  = 'lora_voted_ids';
const MODELS_KEY = 'lora_models_cache';
const ADMIN_PW   = 'admin'; // change this to whatever you want

// ─── Local helpers ────────────────────────────────────────────────────────────
function getVotes() {
  try { return JSON.parse(localStorage.getItem(VOTES_KEY) || '{}'); } catch { return {}; }
}
function saveVotesLocal(v) { localStorage.setItem(VOTES_KEY, JSON.stringify(v)); }
function getVotedIds() {
  try { return JSON.parse(localStorage.getItem(VOTED_KEY) || '[]'); } catch { return []; }
}
function setVotedIds(a) { localStorage.setItem(VOTED_KEY, JSON.stringify(a)); }

// ─── Read votes.json publicly (no token needed) ───────────────────────────────
async function loadVotesFromGitHub() {
  try {
    // Use raw.githubusercontent.com — fully public, no auth
    const url = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/votes.json?t=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

// ─── Write vote via repository_dispatch (token stays in GitHub secret) ────────
async function dispatchVote(modelId) {
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/dispatches`;
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify({
        event_type: 'cast_vote',
        client_payload: { model_id: modelId }
      })
    });
    // 204 = success, 401/404 = workflow not set up yet
    return res.status === 204;
  } catch { return false; }
}

// ─── Civitai API ──────────────────────────────────────────────────────────────
async function fetchCivitaiLoras(username) {
  const LORA_TYPES = ['LORA', 'LoCon', 'DoRA'];
  let allItems = [];
  for (const type of LORA_TYPES) {
    let cursor = null;
    let page = 0;
    while (true) {
      page++;
      let url = `https://civitai.red/api/v1/models?username=${encodeURIComponent(username)}&types=${type}&limit=100&nsfw=true&sort=Newest`;
      if (cursor) url += `&cursor=${encodeURIComponent(cursor)}`;
      try {
        const res = await fetch(url);
        if (!res.ok) break;
        const data = await res.json();
        const items = data.items || [];
        allItems = allItems.concat(items);
        if (!data.metadata?.nextCursor || items.length === 0) break;
        cursor = data.metadata.nextCursor;
        if (page > 20) break;
      } catch (e) { break; }
    }
  }
  const seen = new Set();
  return allItems.filter(m => {
    if (seen.has(m.id)) return false;
    seen.add(m.id);
    return true;
  });
}

function extractModelData(item) {
  const version  = item.modelVersions?.[0] || {};
  const image    = version.images?.[0]?.url || null;
  const baseModel = version.baseModel || 'Unknown';
  return {
    id: String(item.id),
    name: item.name,
    image,
    baseModel,
    downloadCount: item.stats?.downloadCount || 0,
    favoriteCount: item.stats?.favoriteCount || 0,
    createdAt: item.createdAt || '',
    civitaiUrl: `https://civitai.red/models/${item.id}`,
    nsfw: item.nsfw || false
  };
}

// ─── State ────────────────────────────────────────────────────────────────────
let allModels  = [];
let votes      = {};
let sortMode   = 'popular';
let searchTerm = '';
let adminMode  = false;

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function init() {
  renderGrid(null);

  // Load votes from public raw file
  const ghVotes = await loadVotesFromGitHub();
  if (ghVotes) {
    votes = ghVotes;
    saveVotesLocal(votes);
  } else {
    votes = getVotes();
  }

  // Fetch models from Civitai
  const raw = await fetchCivitaiLoras(CI_USER);
  if (!raw || raw.length === 0) {
    const cached = localStorage.getItem(MODELS_KEY);
    if (cached) {
      allModels = JSON.parse(cached);
      renderGrid(allModels);
      toast('Using cached model list — Civitai may be unavailable', true);
    } else {
      showError();
    }
    return;
  }
  allModels = raw.map(extractModelData);
  localStorage.setItem(MODELS_KEY, JSON.stringify(allModels));
  renderGrid(allModels);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function filteredSorted() {
  let list = allModels.filter(m =>
    m.name.toLowerCase().includes(searchTerm.toLowerCase())
  );
  const voteCount = id => votes[id] || 0;
  if (sortMode === 'popular') {
    list.sort((a, b) => voteCount(b.id) - voteCount(a.id));
  } else if (sortMode === 'newest') {
    list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  } else {
    list.sort((a, b) => a.name.localeCompare(b.name));
  }
  return list;
}

function renderGrid(models) {
  const grid = document.getElementById('lora-grid');
  if (models === null) {
    grid.innerHTML = `<div class="state-msg"><div class="spinner"></div><p>Fetching your LoRAs from Civitai…</p></div>`;
    return;
  }
  if (!models.length) {
    grid.innerHTML = `<div class="state-msg"><div class="icon">🔍</div><p>No models found.</p></div>`;
    return;
  }
  const votedIds = getVotedIds();
  const list = filteredSorted();
  if (!list.length) {
    grid.innerHTML = `<div class="state-msg"><div class="icon">✦</div><p>No models match your search.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(m => cardHTML(m, votedIds)).join('');
}

function cardHTML(m, votedIds) {
  const count   = votes[m.id] || 0;
  const hasVote = votedIds.includes(m.id);
  const thumb   = m.image
    ? `<img src="${m.image}" alt="${esc(m.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  return `
  <div class="lora-card${hasVote ? ' voted' : ''}" id="card-${m.id}">
    <div class="card-thumb">
      ${thumb}
      <div class="no-img" style="${m.image ? 'display:none' : ''}">✦</div>
      <div class="voted-badge">Voted</div>
    </div>
    <div class="card-body">
      <div class="card-name" title="${esc(m.name)}">${esc(m.name)}</div>
      <div class="card-meta">
        <span class="tag base-model">${esc(m.baseModel)}</span>
      </div>
      <div class="card-stats">
        <span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          ${fmt(m.downloadCount)}
        </span>
        <span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          ${fmt(m.favoriteCount)}
        </span>
      </div>
      <button
        class="vote-btn${hasVote ? ' voted-state' : ''}"
        onclick="vote('${m.id}')"
        ${hasVote ? 'disabled' : ''}
      >
        ${hasVote ? '✓ Requested' : '↑ Request port'}
        <span class="vote-count-pill" id="vcount-${m.id}">${count}</span>
      </button>
    </div>
  </div>`;
}

function showError() {
  document.getElementById('lora-grid').innerHTML = `
    <div class="state-msg">
      <div class="icon">⚠</div>
      <p>Couldn't load models from Civitai. Try again later.</p>
    </div>`;
}

// ─── Voting ───────────────────────────────────────────────────────────────────
async function vote(id) {
  const votedIds = getVotedIds();
  if (votedIds.includes(id)) return;

  // Optimistic UI update
  votedIds.push(id);
  setVotedIds(votedIds);
  votes[id] = (votes[id] || 0) + 1;
  saveVotesLocal(votes);

  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.add('voted');
    const btn = card.querySelector('.vote-btn');
    btn.classList.add('voted-state');
    btn.disabled = true;
    btn.innerHTML = `✓ Requested <span class="vote-count-pill" id="vcount-${id}">${votes[id]}</span>`;
  }
  if (sortMode === 'popular') renderGrid(allModels);

  // Trigger GitHub Actions workflow — token stays safely in GitHub secret
  const ok = await dispatchVote(id);
  if (ok) {
    toast('Vote recorded!');
  } else {
    toast('Vote saved locally — workflow may not be set up yet.', true);
  }
}

// ─── Filter / Sort ────────────────────────────────────────────────────────────
function filterCards() {
  searchTerm = document.getElementById('search-input').value;
  renderGrid(allModels);
}

function setSortMode(mode) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn[id^="sort-"]').forEach(b => b.classList.remove('active'));
  document.getElementById(`sort-${mode}`).classList.add('active');
  renderGrid(allModels);
}

// ─── Admin ────────────────────────────────────────────────────────────────────
function toggleAdmin() {
  if (adminMode) { showMain(); return; }
  const pw = prompt('Admin password:');
  if (pw !== ADMIN_PW) { toast('Incorrect password', true); return; }
  showAdmin();
}

function showAdmin() {
  adminMode = true;
  document.getElementById('admin-view').classList.add('visible');
  document.getElementById('main-view').classList.add('hidden');
  document.getElementById('admin-toggle-btn').textContent = '← Back';
  renderLeaderboard();
}

function showMain() {
  adminMode = false;
  document.getElementById('admin-view').classList.remove('visible');
  document.getElementById('main-view').classList.remove('hidden');
  document.getElementById('admin-toggle-btn').textContent = 'Admin';
}

function renderLeaderboard() {
  const lb = document.getElementById('leaderboard');
  const items = allModels
    .map(m => ({ ...m, count: votes[m.id] || 0 }))
    .filter(m => m.count > 0)
    .sort((a, b) => b.count - a.count);

  if (!items.length) {
    lb.innerHTML = `<div class="lb-empty">No votes yet — share the page with your subscribers!</div>`;
    return;
  }

  const max = items[0].count;
  lb.innerHTML = items.map((m, i) => `
    <div class="lb-item">
      <div class="lb-rank${i < 3 ? ' top' : ''}">${i < 3 ? ['①','②','③'][i] : `#${i+1}`}</div>
      <div class="lb-info">
        <div class="lb-name">${esc(m.name)}</div>
        <div class="lb-sub">${esc(m.baseModel)} · <a href="${m.civitaiUrl}" target="_blank" style="color:var(--accent);text-decoration:none">Civitai ↗</a></div>
      </div>
      <div class="lb-bar-wrap">
        <div class="lb-bar" style="width:${Math.round((m.count/max)*100)}%"></div>
      </div>
      <div class="lb-votes">${m.count}</div>
    </div>
  `).join('');
}

function exportCSV() {
  const items = allModels
    .map(m => ({ ...m, count: votes[m.id] || 0 }))
    .filter(m => m.count > 0)
    .sort((a, b) => b.count - a.count);
  const rows = [['Name','Base Model','Votes','Civitai URL']].concat(
    items.map(m => [`"${m.name}"`, m.baseModel, m.count, m.civitaiUrl])
  );
  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'lora-port-requests.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ─── Utils ───────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(n) { return n >= 1000 ? (n/1000).toFixed(1) + 'k' : String(n); }

let toastTimer;
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

init();
</script>
</body>
</html>
