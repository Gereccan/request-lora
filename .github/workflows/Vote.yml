name: Record vote

on:
  repository_dispatch:
    types: [cast_vote]

jobs:
  vote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update votes.json
        env:
          MODEL_ID: ${{ github.event.client_payload.model_id }}
        run: |
          python3 - <<'EOF'
          import json, os

          model_id = os.environ['MODEL_ID']

          with open('votes.json', 'r') as f:
              votes = json.load(f)

          votes[model_id] = votes.get(model_id, 0) + 1

          with open('votes.json', 'w') as f:
              json.dump(votes, f, indent=2)

          print(f"Vote recorded: {model_id} now has {votes[model_id]} votes")
          EOF

      - name: Commit updated votes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add votes.json
          git diff --cached --quiet || git commit -m "Vote: ${{ github.event.client_payload.model_id }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
